name: sentinel_flow-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install extractor dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r extractor/requirements.txt

      - name: Python syntax check
        run: python -m compileall extractor/app

      - name: Validate n8n workflow JSON
        run: python -m json.tool n8n/workflows/sentinel_flow.workflow.json > /tmp/workflow.json

      - name: Build Docker images
        run: docker compose build
