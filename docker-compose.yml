services:
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_password}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel_n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: sentinel-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-sentinel_n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-sentinel}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_password}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change_me_to_a_32_char_secret_key}
      N8N_DIAGNOSTICS_ENABLED: false
      N8N_PERSONALIZATION_ENABLED: false
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_PRUNE: true
      EXECUTIONS_DATA_MAX_AGE: 336
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows

  extractor:
    build: ./extractor
    container_name: sentinel-extractor
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_MODEL: ${AI_MODEL:-anthropic/claude-3.5-sonnet}
      REQUIRE_REAL_AI: ${REQUIRE_REAL_AI:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./samples:/samples:ro

  portal:
    image: nginx:1.27-alpine
    container_name: sentinel-portal
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - n8n

volumes:
  postgres_data:
  n8n_data:
